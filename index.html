<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GYM — Meu Treino</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f4f3ef; --surface: #ffffff; --surface2: #f0efeb;
    --text: #1a1a18; --muted: #888780; --border: rgba(0,0,0,0.10); --border2: rgba(0,0,0,0.18);
    --accent: #1D9E75; --accent2: #0F6E56; --accent-light: #E1F5EE;
    --danger: #E24B4A; --radius-md: 8px; --radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a18; --surface: #242422; --surface2: #2c2c2a;
      --text: #f0efeb; --muted: #888780; --border: rgba(255,255,255,0.10);
      --border2: rgba(255,255,255,0.18); --accent-light: #04342C;
    }
  }
  body { font-family: 'Syne', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  .login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 1.5rem; padding: 1rem; }
  .login-logo { font-size: 56px; font-weight: 800; letter-spacing: -4px; color: var(--accent); }
  .login-sub { font-size: 12px; color: var(--muted); letter-spacing: 3px; text-transform: uppercase; }
  .login-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 2rem; width: 100%; max-width: 340px; box-shadow: 0 4px 24px rgba(0,0,0,0.06); }
  .login-card h2 { font-size: 16px; font-weight: 700; margin-bottom: 1.25rem; }
  .login-card input { width: 100%; padding: 12px 16px; font-size: 18px; font-family: 'DM Mono', monospace; background: var(--surface2); border: 0.5px solid var(--border); border-radius: var(--radius-md); color: var(--text); margin-bottom: 1rem; letter-spacing: 4px; outline: none; }
  .login-card input:focus { border-color: var(--accent); }
  .login-card input::placeholder { letter-spacing: 0; font-family: 'Syne',sans-serif; font-size: 13px; color: var(--muted); }
  .btn-primary { width: 100%; padding: 13px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius-md); font-size: 14px; font-family: 'Syne',sans-serif; font-weight: 700; cursor: pointer; letter-spacing: 1px; transition: background 0.15s; }
  .btn-primary:hover { background: var(--accent2); }
  .login-error { font-size: 12px; color: var(--danger); margin-top: -0.5rem; margin-bottom: 0.75rem; display: none; }

  .main-app { display: none; max-width: 680px; margin: 0 auto; }
  .header { display: flex; align-items: center; justify-content: space-between; padding: 1rem 1.25rem; border-bottom: 0.5px solid var(--border); background: var(--surface); position: sticky; top: 0; z-index: 10; }
  .header-logo { font-size: 22px; font-weight: 800; color: var(--accent); letter-spacing: -1.5px; }
  .header-right { display: flex; align-items: center; gap: 8px; }
  .btn-tab { padding: 6px 16px; border: 0.5px solid var(--border); border-radius: 20px; background: transparent; font-family: 'Syne',sans-serif; font-size: 12px; font-weight: 700; cursor: pointer; color: var(--muted); transition: all 0.15s; letter-spacing: 0.5px; }
  .btn-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-logout { padding: 5px 12px; border: 0.5px solid var(--border); border-radius: var(--radius-md); background: transparent; font-family: 'Syne',sans-serif; font-size: 11px; cursor: pointer; color: var(--muted); }
  .btn-logout:hover { background: var(--surface2); }

  .day-selector { display: flex; gap: 8px; padding: 1rem 1.25rem; overflow-x: auto; background: var(--surface); border-bottom: 0.5px solid var(--border); scrollbar-width: none; -webkit-overflow-scrolling: touch; }
  .day-selector::-webkit-scrollbar { display: none; }
  .day-btn { flex-shrink: 0; padding: 8px 16px; border: 0.5px solid var(--border); border-radius: 20px; background: var(--surface2); cursor: pointer; font-family: 'Syne',sans-serif; font-size: 12px; font-weight: 700; color: var(--muted); transition: all 0.15s; text-align: center; user-select: none; }
  .day-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .day-btn.rest { opacity: 0.45; cursor: default; pointer-events: none; }
  .day-btn:hover:not(.rest):not(.active) { background: var(--accent-light); border-color: var(--accent); color: var(--accent2); }
  .day-name-small { display: block; font-size: 10px; font-weight: 400; margin-bottom: 2px; letter-spacing: 1px; }
  .today-dot { display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: currentColor; margin-left: 4px; vertical-align: middle; opacity: 0.8; }

  .workout-view { padding: 1.25rem; }
  .workout-header { margin-bottom: 1.25rem; }
  .workout-title { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }
  .workout-subtitle { font-size: 11px; color: var(--muted); margin-top: 3px; letter-spacing: 1.5px; text-transform: uppercase; }

  .exercise-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.25rem; margin-bottom: 10px; transition: border-color 0.15s; }
  .exercise-card:hover { border-color: var(--border2); }
  .exercise-top { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
  .exercise-name { font-size: 14px; font-weight: 700; flex: 1; }
  .exercise-badge { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 10px; letter-spacing: 0.5px; white-space: nowrap; }
  .badge-rp { background: #EEEDFE; color: #3C3489; }
  .badge-ds { background: #FAEEDA; color: #633806; }

  .load-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .load-label { font-size: 10px; color: var(--muted); font-weight: 700; letter-spacing: 1.5px; white-space: nowrap; }
  .load-input { width: 82px; padding: 7px 10px; font-family: 'DM Mono',monospace; font-size: 15px; font-weight: 500; background: var(--surface2); border: 0.5px solid var(--border); border-radius: var(--radius-md); color: var(--text); text-align: center; outline: none; transition: border-color 0.15s; }
  .load-input:focus { border-color: var(--accent); }
  .load-unit { font-size: 12px; color: var(--muted); }
  .save-btn { padding: 7px 16px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius-md); font-size: 11px; font-family: 'Syne',sans-serif; font-weight: 700; cursor: pointer; transition: background 0.15s; letter-spacing: 0.5px; }
  .save-btn:hover { background: var(--accent2); }
  .save-btn.saved { background: #085041; }
  .load-meta { font-family: 'DM Mono',monospace; font-size: 11px; color: var(--muted); margin-left: auto; display: flex; align-items: center; gap: 6px; }
  .pr-badge { color: var(--accent); font-weight: 700; font-size: 11px; font-family: 'Syne',sans-serif; }

  .rest-day { text-align: center; padding: 5rem 1rem; }
  .rest-day .big { font-size: 56px; }
  .rest-day p { font-size: 15px; color: var(--muted); margin-top: 1rem; }

  .history-view { padding: 1.25rem; }
  .history-title { font-size: 22px; font-weight: 800; margin-bottom: 1.25rem; }
  .history-filter { display: flex; gap: 8px; margin-bottom: 1.25rem; flex-wrap: wrap; }
  .filter-btn { padding: 5px 12px; border: 0.5px solid var(--border); border-radius: 16px; background: var(--surface2); font-family: 'Syne',sans-serif; font-size: 11px; font-weight: 700; cursor: pointer; color: var(--muted); transition: all 0.15s; letter-spacing: 0.5px; }
  .filter-btn.active { background: var(--text); color: var(--surface); border-color: var(--text); }
  .history-table { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
  .history-row { display: grid; grid-template-columns: 1fr 90px 72px 48px; padding: 10px 1.25rem; border-bottom: 0.5px solid var(--border); align-items: center; gap: 8px; }
  .history-row:last-child { border-bottom: none; }
  .history-row.hdr { background: var(--surface2); font-size: 10px; font-weight: 700; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; }
  .history-row:not(.hdr):hover { background: var(--surface2); }
  .h-name { font-size: 13px; font-weight: 700; }
  .h-date { font-family: 'DM Mono',monospace; font-size: 12px; color: var(--muted); }
  .h-load { font-family: 'DM Mono',monospace; font-size: 13px; font-weight: 500; }
  .h-pr { font-size: 11px; color: var(--accent); font-weight: 700; font-family: 'Syne',sans-serif; }
  .empty-state { text-align: center; padding: 3rem 1rem; color: var(--muted); }
  .empty-state .icon { font-size: 40px; margin-bottom: 0.75rem; }
  .empty-state p { font-size: 14px; line-height: 1.6; }
  .count-line { font-size: 11px; color: var(--muted); text-align: center; margin-top: 1rem; }

  .settings-section { padding: 1.25rem; }
  .settings-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.5rem; max-width: 360px; }
  .settings-card h3 { font-size: 15px; font-weight: 700; margin-bottom: 1rem; }
  .settings-card input { width: 100%; padding: 10px 14px; font-size: 15px; font-family: 'DM Mono',monospace; background: var(--surface2); border: 0.5px solid var(--border); border-radius: var(--radius-md); color: var(--text); margin-bottom: 0.75rem; letter-spacing: 3px; outline: none; }
  .settings-card input:focus { border-color: var(--accent); }
  .settings-card input::placeholder { letter-spacing: 0; font-family: 'Syne',sans-serif; font-size: 12px; color: var(--muted); }
  .btn-secondary { width: 100%; padding: 11px; background: transparent; color: var(--accent); border: 1.5px solid var(--accent); border-radius: var(--radius-md); font-size: 13px; font-family: 'Syne',sans-serif; font-weight: 700; cursor: pointer; transition: all 0.15s; }
  .btn-secondary:hover { background: var(--accent); color: #fff; }
  .settings-msg { font-size: 12px; margin-top: 0.5rem; display: none; }
  .settings-msg.ok { color: var(--accent); }
  .settings-msg.err { color: var(--danger); }
</style>
</head>
<body>

<div class="login-screen" id="loginScreen">
  <div style="text-align:center">
    <div class="login-logo">GYM</div>
    <div class="login-sub">Diário de treinos</div>
  </div>
  <div class="login-card">
    <h2>Acesso privado</h2>
    <input type="password" id="pinInput" placeholder="Digite sua senha" autocomplete="current-password" />
    <div class="login-error" id="loginError">Senha incorreta. Tente novamente.</div>
    <button class="btn-primary" id="loginBtn">Entrar</button>
  </div>
</div>

<div class="main-app" id="mainApp">
  <div class="header">
    <div class="header-logo">GYM</div>
    <div class="header-right">
      <button class="btn-tab active" id="tabTreino">Treino</button>
      <button class="btn-tab" id="tabHistorico">Histórico</button>
      <button class="btn-tab" id="tabConfig">⚙</button>
      <button class="btn-logout" id="logoutBtn">Sair</button>
    </div>
  </div>
  <div id="treinoSection">
    <div class="day-selector" id="daySelector"></div>
    <div class="workout-view" id="workoutView"></div>
  </div>
  <div class="history-view" id="historicoSection" style="display:none">
    <div class="history-title">Evolução de Cargas</div>
    <div class="history-filter" id="historyFilter"></div>
    <div id="historyContent"></div>
  </div>
  <div class="settings-section" id="configSection" style="display:none">
    <div class="settings-card">
      <h3>Alterar senha</h3>
      <input type="password" id="curPass" placeholder="Senha atual" autocomplete="current-password" />
      <input type="password" id="newPass" placeholder="Nova senha" autocomplete="new-password" />
      <input type="password" id="confPass" placeholder="Confirmar nova senha" autocomplete="new-password" />
      <button class="btn-secondary" id="savePassBtn">Salvar nova senha</button>
      <div class="settings-msg" id="settingsMsg"></div>
    </div>
  </div>
</div>

<script>
var WORKOUT_DATA = {
  segunda: { label: 'Descanso', exercises: [], rest: true },
  terca: { label: 'Triceps e Biceps', grupo: 'Membros', exercises: [
    { id: 'ex1',  name: 'Triceps Frances Corda',  badge: null },
    { id: 'ex2',  name: 'Triceps Testa Corda',    badge: 'REST PAUSE' },
    { id: 'ex3',  name: 'Triceps Corda',          badge: 'DROP SET' },
    { id: 'ex4',  name: 'Triceps Pulley Inverso', badge: null },
    { id: 'ex5',  name: 'Rosca Bayesiana',        badge: null },
    { id: 'ex6',  name: 'Rosca Corda',            badge: 'REST PAUSE' },
    { id: 'ex7',  name: 'Rosca Scott',            badge: 'DROP SET' }
  ]},
  quarta: { label: 'Perna e Trapezio', grupo: 'Membros', exercises: [
    { id: 'ex8',  name: 'Cadeira Extensora', badge: null },
    { id: 'ex9',  name: 'Cadeira Flexora',   badge: null },
    { id: 'ex10', name: 'Leg Press',         badge: null },
    { id: 'ex11', name: 'Gemeos',            badge: null },
    { id: 'ex12', name: 'Remada Alta',       badge: null },
    { id: 'ex13', name: 'Encolhimento',      badge: null },
    { id: 'ex14', name: 'Abdominal',         badge: null }
  ]},
  quinta: { label: 'Descanso', exercises: [], rest: true },
  sexta: { label: 'Peito e Triceps', grupo: 'Membros', exercises: [
    { id: 'ex15', name: 'Peck Deck',             badge: null },
    { id: 'ex16', name: 'Supino Declinado',      badge: null },
    { id: 'ex17', name: 'Supino Inclinado',      badge: null },
    { id: 'ex18', name: 'Cross Over',            badge: null },
    { id: 'ex19', name: 'Triceps Frances Corda', badge: 'REST PAUSE' },
    { id: 'ex20', name: 'Triceps Maquina',       badge: null },
    { id: 'ex21', name: 'Triceps Banco',         badge: null }
  ]},
  sabado: { label: 'Perna e Ombro', grupo: 'Membros', exercises: [
    { id: 'ex22', name: 'Leg Horizontal',      badge: null },
    { id: 'ex23', name: 'Adutora',             badge: null },
    { id: 'ex24', name: 'Abdutora',            badge: null },
    { id: 'ex25', name: 'Gemeos',              badge: null },
    { id: 'ex26', name: 'Desenvolvimento',     badge: null },
    { id: 'ex27', name: 'Elevacao Horizontal', badge: null },
    { id: 'ex28', name: 'Elevacao Vertical',   badge: null }
  ]},
  domingo: { label: 'Costas e Biceps', grupo: 'Membros', exercises: [
    { id: 'ex29', name: 'Pulley Barra Romana',    badge: null },
    { id: 'ex30', name: 'Pulley Fechado',         badge: null },
    { id: 'ex31', name: 'Remada Baixa Triangulo', badge: null },
    { id: 'ex32', name: 'Rosca Concentrada',      badge: null },
    { id: 'ex33', name: 'Rosca 45',               badge: 'REST PAUSE' },
    { id: 'ex34', name: 'Rosca Martelo Cruzado',  badge: null },
    { id: 'ex35', name: 'Abdominal',              badge: null }
  ]}
};

var DAYS     = ['segunda','terca','quarta','quinta','sexta','sabado','domingo'];
var DAY_ABBR = { segunda:'SEG', terca:'TER', quarta:'QUA', quinta:'QUI', sexta:'SEX', sabado:'SAB', domingo:'DOM' };
var todayMap = [6,0,1,2,3,4,5];
var todayKey = DAYS[todayMap[new Date().getDay()]];
var currentDay = null;
var currentTab = 'treino';
var historyFilter = 'todos';
var PASS_KEY = 'gym_password';

function getPassword() { return localStorage.getItem(PASS_KEY) || 'gym123'; }

function loadKey(key) {
  try { var v = localStorage.getItem(key); return v ? JSON.parse(v) : null; } catch(e) { return null; }
}
function saveKey(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {}
}
function getHistory(exId) { return loadKey('load:' + exId) || []; }
function saveLoad(exId, exName, kg) {
  var history = getHistory(exId);
  history.push({ date: new Date().toLocaleDateString('pt-BR'), kg: parseFloat(kg), name: exName });
  saveKey('load:' + exId, history);
  return history;
}
function getAllExercises() {
  var all = [];
  DAYS.forEach(function(d) { if (!WORKOUT_DATA[d].rest) WORKOUT_DATA[d].exercises.forEach(function(e) { all.push(e); }); });
  return all;
}

function tryLogin() {
  var val = document.getElementById('pinInput').value;
  if (val === getPassword()) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('mainApp').style.display = 'block';
    initApp();
  } else {
    document.getElementById('loginError').style.display = 'block';
    document.getElementById('pinInput').value = '';
    document.getElementById('pinInput').focus();
  }
}

function logout() {
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('mainApp').style.display = 'none';
  document.getElementById('pinInput').value = '';
}

function changePassword() {
  var cur  = document.getElementById('curPass').value;
  var nw   = document.getElementById('newPass').value;
  var conf = document.getElementById('confPass').value;
  var msg  = document.getElementById('settingsMsg');
  msg.className = 'settings-msg';
  if (cur !== getPassword())  { msg.textContent = 'Senha atual incorreta.'; msg.classList.add('err'); msg.style.display='block'; return; }
  if (nw.length < 4)          { msg.textContent = 'Nova senha precisa ter 4+ caracteres.'; msg.classList.add('err'); msg.style.display='block'; return; }
  if (nw !== conf)            { msg.textContent = 'As senhas nao coincidem.'; msg.classList.add('err'); msg.style.display='block'; return; }
  saveKey(PASS_KEY, nw);
  msg.textContent = 'Senha alterada com sucesso!';
  msg.classList.add('ok'); msg.style.display='block';
  document.getElementById('curPass').value = '';
  document.getElementById('newPass').value = '';
  document.getElementById('confPass').value = '';
}

function switchTab(tab) {
  currentTab = tab;
  ['treino','historico','config'].forEach(function(t) {
    var btn = document.getElementById('tab' + t.charAt(0).toUpperCase() + t.slice(1));
    if (btn) btn.classList.toggle('active', t === tab);
  });
  document.getElementById('treinoSection').style.display    = tab==='treino'    ? 'block' : 'none';
  document.getElementById('historicoSection').style.display = tab==='historico' ? 'block' : 'none';
  document.getElementById('configSection').style.display    = tab==='config'    ? 'block' : 'none';
  if (tab === 'historico') renderHistory();
}

function initApp() {
  buildDaySelector();
  var startDay = WORKOUT_DATA[todayKey].rest ? DAYS.find(function(d) { return !WORKOUT_DATA[d].rest; }) : todayKey;
  selectDay(startDay);
}

function buildDaySelector() {
  var sel = document.getElementById('daySelector');
  sel.innerHTML = '';
  DAYS.forEach(function(day) {
    var d = WORKOUT_DATA[day];
    var btn = document.createElement('div');
    btn.className = 'day-btn' + (d.rest ? ' rest' : '');
    btn.id = 'daybtn-' + day;
    var isToday = day === todayKey;
    var label = d.rest ? 'DESCANSO' : d.label.split(' ')[0];
    var dot = isToday ? '<span class="today-dot"></span>' : '';
    btn.innerHTML = '<span class="day-name-small">' + DAY_ABBR[day] + '</span>' + label + dot;
    if (!d.rest) {
      btn.addEventListener('click', (function(k){ return function(){ selectDay(k); }; })(day));
    }
    sel.appendChild(btn);
  });
}

function selectDay(day) {
  currentDay = day;
  DAYS.forEach(function(d) {
    var b = document.getElementById('daybtn-' + d);
    if (b) b.classList.toggle('active', d === day);
  });
  renderWorkout(day);
}

function renderWorkout(day) {
  var wv = document.getElementById('workoutView');
  var d  = WORKOUT_DATA[day];
  if (d.rest) {
    wv.innerHTML = '<div class="rest-day"><div class="big">💤</div><p>Dia de descanso — recupere-se bem!</p></div>';
    return;
  }
  wv.innerHTML = '<div class="workout-header"><div class="workout-title">' + d.label + '</div><div class="workout-subtitle">' + d.grupo + ' · ' + d.exercises.length + ' exercicios</div></div><div id="exerciseList"></div>';
  var list = document.getElementById('exerciseList');
  d.exercises.forEach(function(ex) {
    var hist   = getHistory(ex.id);
    var lastKg = hist.length > 0 ? hist[hist.length-1].kg : '';
    var maxKg  = hist.length > 0 ? Math.max.apply(null, hist.map(function(h){ return h.kg; })) : null;
    var isPR   = hist.length > 1 && parseFloat(lastKg) === maxKg;
    var prevKg = hist.length > 1 ? hist[hist.length-2].kg : null;
    var badgeHtml = '';
    if (ex.badge) {
      var cls = ex.badge === 'REST PAUSE' ? 'badge-rp' : 'badge-ds';
      badgeHtml = '<span class="exercise-badge ' + cls + '">' + ex.badge + '</span>';
    }
    var histTxt = prevKg !== null ? 'ant: ' + prevKg + 'kg' : (hist.length===1 ? '1x reg.' : '');
    var prTxt   = isPR ? '<span class="pr-badge">★ PR</span>' : '';

    var card = document.createElement('div');
    card.className = 'exercise-card';
    card.id = 'card-' + ex.id;
    card.innerHTML =
      '<div class="exercise-top"><span class="exercise-name">' + ex.name + '</span>' + badgeHtml + '</div>' +
      '<div class="load-row">' +
        '<span class="load-label">CARGA</span>' +
        '<input class="load-input" type="number" min="0" step="0.5" value="' + lastKg + '" placeholder="0" id="inp-' + ex.id + '" />' +
        '<span class="load-unit">kg</span>' +
        '<button class="save-btn" id="btn-' + ex.id + '">Salvar</button>' +
        '<span class="load-meta" id="meta-' + ex.id + '">' + histTxt + ' ' + prTxt + '</span>' +
      '</div>';
    list.appendChild(card);

    document.getElementById('btn-' + ex.id).addEventListener('click', (function(id, name){ return function(){ handleSave(id, name); }; })(ex.id, ex.name));
    document.getElementById('inp-' + ex.id).addEventListener('keydown', (function(id, name){ return function(e){ if(e.key==='Enter') handleSave(id, name); }; })(ex.id, ex.name));
  });
}

function handleSave(exId, exName) {
  var inp  = document.getElementById('inp-'  + exId);
  var btn  = document.getElementById('btn-'  + exId);
  var meta = document.getElementById('meta-' + exId);
  var kg   = parseFloat(inp.value);
  if (!kg || isNaN(kg)) { inp.focus(); return; }
  var history = saveLoad(exId, exName, kg);
  btn.textContent = '✓ Salvo';
  btn.classList.add('saved');
  var maxKg  = Math.max.apply(null, history.map(function(h){ return h.kg; }));
  var isPR   = history.length > 1 && kg === maxKg;
  var prevKg = history.length > 1 ? history[history.length-2].kg : null;
  var histTxt = prevKg !== null ? 'ant: ' + prevKg + 'kg' : history.length + 'x reg.';
  var prTxt   = isPR ? '<span class="pr-badge">★ PR</span>' : '';
  meta.innerHTML = histTxt + ' ' + prTxt;
  setTimeout(function(){ btn.textContent = 'Salvar'; btn.classList.remove('saved'); }, 2000);
}

function renderHistory() {
  var allEx = getAllExercises();
  var fDiv  = document.getElementById('historyFilter');
  var fDays = ['todos'].concat(DAYS.filter(function(d){ return !WORKOUT_DATA[d].rest; }));
  fDiv.innerHTML = fDays.map(function(d) {
    var label = d === 'todos' ? 'Todos' : DAY_ABBR[d] + ': ' + WORKOUT_DATA[d].label.split(' ')[0];
    var cls = historyFilter===d ? ' active' : '';
    return '<button class="filter-btn' + cls + '" data-day="' + d + '">' + label + '</button>';
  }).join('');
  fDiv.querySelectorAll('.filter-btn').forEach(function(btn) {
    btn.addEventListener('click', function(){ setFilter(btn.getAttribute('data-day')); });
  });

  var rows = [];
  allEx.forEach(function(ex) {
    getHistory(ex.id).forEach(function(h) { rows.push({ name: ex.name, date: h.date, kg: h.kg, exId: ex.id }); });
  });
  if (historyFilter !== 'todos') {
    var ids = WORKOUT_DATA[historyFilter].exercises.map(function(e){ return e.id; });
    rows = rows.filter(function(r){ return ids.indexOf(r.exId) >= 0; });
  }
  rows.sort(function(a,b) {
    var da = a.date.split('/').reverse().join('');
    var db = b.date.split('/').reverse().join('');
    return db.localeCompare(da);
  });
  var prMap = {};
  allEx.forEach(function(ex) {
    var h = getHistory(ex.id);
    if (h.length > 0) prMap[ex.id] = Math.max.apply(null, h.map(function(x){ return x.kg; }));
  });

  var content = document.getElementById('historyContent');
  if (rows.length === 0) {
    content.innerHTML = '<div class="empty-state"><div class="icon">📊</div><p>Nenhum registro ainda.<br>Salve suas cargas no treino!</p></div>';
    return;
  }
  var rowsHtml = rows.map(function(r) {
    var isMulti = (loadKey('load:'+r.exId)||[]).length > 1;
    var pr = isMulti && r.kg === prMap[r.exId];
    return '<div class="history-row"><div class="h-name">' + r.name + '</div><div class="h-date">' + r.date + '</div><div class="h-load">' + r.kg + ' kg</div><div class="h-pr">' + (pr ? '★ PR' : '') + '</div></div>';
  }).join('');
  content.innerHTML = '<div class="history-table"><div class="history-row hdr"><div>Exercicio</div><div>Data</div><div>Carga</div><div></div></div>' + rowsHtml + '</div><div class="count-line">' + rows.length + ' registro' + (rows.length!==1?'s':'') + '</div>';
}

function setFilter(day) { historyFilter = day; renderHistory(); }

document.getElementById('loginBtn').addEventListener('click', tryLogin);
document.getElementById('pinInput').addEventListener('keydown', function(e){ if(e.key==='Enter') tryLogin(); });
document.getElementById('logoutBtn').addEventListener('click', logout);
document.getElementById('tabTreino').addEventListener('click', function(){ switchTab('treino'); });
document.getElementById('tabHistorico').addEventListener('click', function(){ switchTab('historico'); });
document.getElementById('tabConfig').addEventListener('click', function(){ switchTab('config'); });
document.getElementById('savePassBtn').addEventListener('click', changePassword);
</script>
